name: CI & Deploy

# Build/test once, then deploy that exact dist. Production ships from `main`;
# pull requests and other branches get Firebase Hosting preview-channel URLs.
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Browser tests (against the built dist)
        run: npm run test:e2e

      # --- Deploy the exact tested artifact ---

      - name: Deploy to production (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ELARIS_ABB6D }}
          projectId: elaris-abb6d
          channelId: live
          firebaseToolsVersion: '15.23.0'

      - name: Deploy preview channel (pull request)
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ELARIS_ABB6D }}
          projectId: elaris-abb6d
          expires: 7d
          firebaseToolsVersion: '15.23.0'

      - name: Deploy preview channel (non-main branch push)
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ELARIS_ABB6D }}
          projectId: elaris-abb6d
          channelId: branch-${{ github.ref_name }}
          expires: 7d
          firebaseToolsVersion: '15.23.0'
